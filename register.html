<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم الآن | Yemen Engineer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .auth-page { padding: 60px 20px; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 10% 20%, rgba(15,76,92,0.03) 0%, rgba(26,107,128,0.05) 90%); min-height: calc(100vh - 149px); }
        .auth-card { background: #fff; border-radius: var(--border-radius-lg); box-shadow: var(--shadow-lg); padding: 45px 30px; width: 100%; max-width: 620px; border: 1.5px solid var(--border-color); position: relative; overflow: hidden; transition: max-width 0.3s ease; }
        .auth-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: var(--primary-gradient); }
        .role-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 28px; }
        .role-btn { border: 1.5px solid var(--border-color); border-radius: var(--border-radius); padding: 20px 16px; text-align: center; cursor: pointer; transition: var(--transition); font-family: inherit; background: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
        .role-btn:hover { border-color: var(--primary-color); background: rgba(15,76,92,.02); transform: translateY(-2px); box-shadow: var(--shadow); }
        .role-btn.selected { border-color: var(--primary-color); background: rgba(15,76,92,.06); color: var(--primary-color); font-weight: 700; box-shadow: 0 4px 12px rgba(15,76,92,0.12); }
        .role-icon-wrapper { width: 44px; height: 44px; border-radius: 50%; background: #fff; border: 1.5px solid var(--border-color); display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: var(--transition); }
        .role-btn.selected .role-icon-wrapper { background: var(--primary-color); border-color: var(--primary-color); color: #fff; }
        .role-btn .role-name { font-size: 0.95rem; font-weight: 800; color: var(--dark-color); }
        .role-btn .role-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; text-align: center; margin-top: 4px; font-weight: 500; }
        .role-btn.selected .role-desc { color: rgba(15,76,92,.8); }

        @media (min-width: 768px) {
            .auth-card { max-width: 900px; padding: 45px 50px; }
            .role-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
        }
        .doc-upload-zone { border: 2px dashed var(--border-color); border-radius: var(--border-radius); padding: 22px 16px; text-align: center; cursor: pointer; transition: var(--transition); position: relative; }
        .doc-upload-zone:hover, .doc-upload-zone.dragover { border-color: var(--primary-color); background: rgba(15,76,92,.04); }
        .doc-upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .doc-reg-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #f9fbfc; border: 1px solid var(--border-color); border-radius: var(--border-radius-sm); margin-top: 8px; font-size:.82rem; }
        .doc-reg-item span { flex:1; font-weight:700; color:var(--dark-color); }
    </style>
</head>
<body>
    <header id="site-header" class="site-header"></header>
    <main class="auth-page">
        <div class="auth-card">
            <h1 style="font-size:1.6rem;font-weight:800;text-align:center;margin-bottom:8px;color:var(--dark-color);">إنشاء حساب جديد</h1>
            <p style="text-align:center;color:var(--text-muted);font-size:.9rem;margin-bottom:28px;">اختر نوع حسابك واملأ بياناتك لتبدأ رحلتك المهنية.</p>

            <div id="reg-error" class="alert alert-danger" style="display:none;"></div>
            <div id="reg-success" class="alert alert-success" style="display:none;"></div>

            <p style="font-size:.85rem;font-weight:700;margin-bottom:12px;color:var(--dark-color);">اختر نوع الحساب التخصصي:</p>
            <div class="role-grid">
                <button type="button" class="role-btn selected" data-role="client" onclick="selectRole(this,'client')">
                    <div class="role-icon-wrapper">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div class="role-name">عميل</div>
                    <div class="role-desc">طلب خدمات هندسية ونشر مشاريع ومناقصات</div>
                </button>
                <button type="button" class="role-btn" data-role="engineer" onclick="selectRole(this,'engineer')">
                    <div class="role-icon-wrapper">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94z"></path></svg>
                    </div>
                    <div class="role-name">مهندس مستقل</div>
                    <div class="role-desc">تقديم عروض للمشاريع وتوفير حلول فنية</div>
                </button>
                <button type="button" class="role-btn" data-role="office" onclick="selectRole(this,'office')">
                    <div class="role-icon-wrapper">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="9" y1="22" x2="9" y2="16"></line><line x1="15" y1="22" x2="15" y2="16"></line><line x1="9" y1="16" x2="15" y2="16"></line></svg>
                    </div>
                    <div class="role-name">مكتب هندسي</div>
                    <div class="role-desc">دراسات وتصاميم وإشراف فني على أعمال التنفيذ</div>
                </button>
                <button type="button" class="role-btn" data-role="workshop" onclick="selectRole(this,'workshop')">
                    <div class="role-icon-wrapper">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </div>
                    <div class="role-name">ورشة فنية</div>
                    <div class="role-desc">خدمات صيانة وتصنيع وتركيبات تخصصية</div>
                </button>
                <button type="button" class="role-btn" data-role="company" onclick="selectRole(this,'company')">
                    <div class="role-icon-wrapper">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                    </div>
                    <div class="role-name">شركة هندسية</div>
                    <div class="role-desc">تنفيذ مقاولات وتجهيز مشاريع إنشائية متكاملة</div>
                </button>
                <button type="button" class="role-btn" data-role="agent" onclick="selectRole(this,'agent')">
                    <div class="role-icon-wrapper">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    </div>
                    <div class="role-name">وكيل معتمد</div>
                    <div class="role-desc">تسويق وتوريد أجهزة ومعدات هندسية مع الضمان</div>
                </button>
            </div>

            <form id="reg-form">
                <div class="form-group"><label class="form-label">الاسم الكامل</label><input type="text" id="fullName" class="form-control" required></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                    <div class="form-group"><label class="form-label">البريد الإلكتروني</label><input type="email" id="email" class="form-control" required></div>
                    <div class="form-group"><label class="form-label">رقم الهاتف</label><input type="tel" id="phone" class="form-control" required></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                    <div class="form-group"><label class="form-label">المحافظة</label>
                        <select id="governorate" class="form-control">
                            <option>صنعاء</option><option>عدن</option><option>تعز</option><option>حضرموت</option><option>الحديدة</option><option>إب</option><option>ذمار</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">المدينة</label><input type="text" id="city" class="form-control" required></div>
                </div>

                <div id="extra-fields"></div>

                <!-- PDF Upload (non-client roles only) -->
                <div id="docs-reg-section" style="display:none;margin-bottom:16px;">
                    <label class="form-label">الوثائق الرسمية (PDF فقط) <span style="color:var(--text-muted);font-weight:normal;">(اختياري)</span></label>
                    <p style="font-size:.78rem;color:var(--text-muted);margin-bottom:8px;">الشهادات الدراسية، السجل التجاري، ترخيص المزاولة — بحد أقصى 5 ملفات.</p>
                    <div class="doc-upload-zone" id="reg-drop-zone">
                        <input type="file" id="reg-doc-input" accept="application/pdf" multiple>
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#0f4c5c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <p style="font-size:.82rem;font-weight:700;color:var(--dark-color);margin:0;">اسحب ملفات PDF أو انقر للاختيار</p>
                    </div>
                    <div id="reg-doc-list"></div>
                </div>

                <div class="form-group"><label class="form-label">كلمة المرور</label><input type="password" id="password" class="form-control" minlength="6" required></div>
                <div class="form-group"><label class="form-label">تأكيد كلمة المرور</label><input type="password" id="passwordConfirm" class="form-control" required></div>

                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">إنشاء الحساب</button>
            </form>
            <p style="text-align:center;margin-top:18px;font-size:.88rem;">لديك حساب؟ <a href="login.html" style="color:var(--primary-color);font-weight:700;">تسجيل الدخول</a></p>
        </div>
    </main>
    <footer id="site-footer" class="site-footer"></footer>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    let selectedRole = 'client';
    let regDocs = [];

    function selectRole(btn, role) {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedRole = role;
        renderExtraFields(role);
        document.getElementById('docs-reg-section').style.display = role !== 'client' ? 'block' : 'none';
    }

    function renderExtraFields(role) {
        const container = document.getElementById('extra-fields');
        const extraMap = {
            engineer: `<div class="form-group"><label class="form-label">التخصص الهندسي</label><input type="text" id="specialty" class="form-control" placeholder="مثال: طاقة شمسية، معماري، مدني"></div><div class="form-group"><label class="form-label">سنوات الخبرة</label><input type="number" id="experienceYears" class="form-control" min="1" max="50"></div><div class="form-group"><label class="form-label">نبذة مختصرة</label><textarea id="bio" class="form-control" rows="3"></textarea></div>`,
            office: `<div class="form-group"><label class="form-label">اسم المكتب</label><input type="text" id="officeName" class="form-control" required></div><div class="form-group"><label class="form-label">نوع النشاط</label><input type="text" id="activityType" class="form-control"></div>`,
            workshop: `<div class="form-group"><label class="form-label">اسم الورشة</label><input type="text" id="workshopName" class="form-control" required></div><div class="form-group"><label class="form-label">نوع النشاط</label><input type="text" id="activityType" class="form-control"></div>`,
            agent: `<div class="form-group"><label class="form-label">أنواع المنتجات</label><input type="text" id="productTypes" class="form-control" placeholder="مثال: طاقة شمسية، مولدات..."></div><div class="form-group"><label class="form-label">العلامات التجارية</label><input type="text" id="brands" class="form-control" placeholder="مثال: Longi, Growatt..."></div>`,
            company: `<div class="form-group"><label class="form-label">اسم الشركة</label><input type="text" id="companyName" class="form-control"></div>`
        };
        container.innerHTML = extraMap[role] || '';
    }

    // PDF upload setup
    document.addEventListener('DOMContentLoaded', () => {
        const zone = document.getElementById('reg-drop-zone');
        const inp  = document.getElementById('reg-doc-input');
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); handleRegFiles(Array.from(e.dataTransfer.files)); });
        inp.addEventListener('change', () => handleRegFiles(Array.from(inp.files)));
    });

    function handleRegFiles(files) {
        const pdfs = files.filter(f => f.type === 'application/pdf');
        if (!pdfs.length) { showToast('يُقبل ملف PDF فقط.', 'error'); return; }
        if (regDocs.length + pdfs.length > 5) { showToast('الحد الأقصى 5 ملفات.', 'error'); return; }
        pdfs.forEach(file => {
            const reader = new FileReader();
            reader.onload = ev => {
                regDocs.push({ name: file.name, size: Math.round(file.size / 1024) + ' KB', data: ev.target.result, uploadedAt: new Date().toISOString() });
                renderRegDocList();
            };
            reader.readAsDataURL(file);
        });
    }

    function renderRegDocList() {
        const list = document.getElementById('reg-doc-list');
        list.innerHTML = regDocs.map((d, i) => `
            <div class="doc-reg-item">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#dc3545" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                <span>${d.name}</span>
                <small style="color:var(--text-muted)">${d.size}</small>
                <button type="button" onclick="regDocs.splice(${i},1);renderRegDocList()" style="border:none;background:none;color:var(--danger-color);cursor:pointer;font-size:1rem;line-height:1;">&times;</button>
            </div>`).join('');
    }

    document.getElementById('reg-form').addEventListener('submit', async e => {
        e.preventDefault();
        const pw = document.getElementById('password').value;
        if (pw !== document.getElementById('passwordConfirm').value) {
            document.getElementById('reg-error').textContent = 'كلمتا المرور غير متطابقتين.';
            document.getElementById('reg-error').style.display = 'block';
            return;
        }
        document.getElementById('reg-error').style.display = 'none';
        const data = {
            fullName: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            password: pw,
            governorate: document.getElementById('governorate').value,
            city: document.getElementById('city').value,
            type: selectedRole,
            avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150',
            bio: document.getElementById('bio')?.value || ''
        };
        ['specialty','experienceYears','officeName','workshopName','companyName','activityType','productTypes','brands'].forEach(f => {
            const el = document.getElementById(f);
            if (el) data[f] = el.value;
        });
        if (selectedRole !== 'client' && regDocs.length) data.documents = regDocs;
        const result = await registerUser(data);
        const errEl = document.getElementById('reg-error');
        const sucEl = document.getElementById('reg-success');
        if (result.success) {
            errEl.style.display = 'none';
            sucEl.textContent = 'تم إنشاء حسابك بنجاح! يتم تحويلك...';
            sucEl.style.display = 'block';
            setCurrentUser(result.user);
            setTimeout(() => window.location.href = 'dashboard.html', 1200);
        } else {
            sucEl.style.display = 'none';
            errEl.textContent = result.message;
            errEl.style.display = 'block';
        }
    });
    </script>
</body>
</html>
