<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل الخدمات الهندسية | Yemen Engineer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>

<body>
    <header id="site-header" class="site-header"></header>
    <div class="page-header">
        <div class="container">
            <h1>دليل الخدمات الهندسية</h1>
            <p>تصفح الخدمات الهندسية المتاحة واطلب الخدمة مباشرة</p>
        </div>
    </div>
    <main class="main-layout container">
        <div class="filter-bar">
            <div class="filter-field">
                <label>بحث في الخدمات</label>
                <input type="text" id="f-keyword" placeholder="اسم الخدمة أو كلمات دالة..." oninput="filterServices()">
            </div>
        </div>
        <div id="services-grid"
            style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;"></div>
    </main>
    <footer id="site-footer" class="site-footer"></footer>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        let allServices = [];
        document.addEventListener('DOMContentLoaded', async () => {
            allServices = await getData(STORAGE_KEYS.SERVICES);
            renderServices(allServices);
        });

        function renderServices(list) {
            const container = document.getElementById('services-grid');
            if (!list.length) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-title">لا توجد خدمات مطابقة</div></div>';
                return;
            }
            container.innerHTML = list.map(s => `
            <div class="card" style="display:flex;flex-direction:column;padding:0;">
                <img src="${s.image}" style="width:100%;height:180px;object-fit:cover;border-radius:var(--border-radius) var(--border-radius) 0 0;">
                <div style="padding:20px;flex:1;display:flex;flex-direction:column;">
                    <h3 class="card-title" style="margin-bottom:10px;">${s.name}</h3>
                    <p class="card-desc" style="flex:1;">${s.description}</p>
                    <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border-color);padding-top:14px;">
                        <span style="font-size:.85rem;color:var(--text-muted);font-weight:600;">${s.countProviders}</span>
                        <a href="post-request.html?category=${encodeURIComponent(s.name)}" class="btn btn-primary btn-sm">اطلب هذه الخدمة</a>
                    </div>
                </div>
            </div>`).join('');
        }

        function filterServices() {
            const kw = document.getElementById('f-keyword').value.toLowerCase();
            const filtered = allServices.filter(s => s.name.toLowerCase().includes(kw) || s.description.toLowerCase().includes(kw));
            renderServices(filtered);
        }
    </script>
</body>

</html>
