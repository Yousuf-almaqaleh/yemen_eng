<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات الحساب | Yemen Engineer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .doc-upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: var(--border-radius);
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .doc-upload-zone:hover, .doc-upload-zone.dragover {
            border-color: var(--primary-color);
            background: rgba(15,76,92,.04);
        }
        .doc-upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .doc-icon {
            width: 48px;
            height: 48px;
            background: rgba(15,76,92,.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }
        .doc-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
        .doc-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #f9fbfc;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
        }
        .doc-item-icon {
            width: 36px;
            height: 36px;
            background: rgba(220,53,69,.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .doc-item-name { flex: 1; font-size: .88rem; font-weight: 700; color: var(--dark-color); }
        .doc-item-size { font-size: .75rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <header id="site-header" class="site-header"></header>
    <main class="main-layout container" style="max-width:720px; margin-right:0; margin-left:auto;">
        <h1 style="font-size:1.4rem;font-weight:800;margin-bottom:24px;">إعدادات الحساب الشخصي</h1>
        <div id="save-success" class="alert alert-success" style="display:none;">تم حفظ التعديلات بنجاح!</div>
        <form id="profile-form">
            <div class="section-block">
                <h2 class="section-block-title">البيانات الأساسية</h2>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group"><label class="form-label">الاسم الكامل</label><input type="text" id="fullName" class="form-control" required></div>
                    <div class="form-group"><label class="form-label">رقم الهاتف</label><input type="tel" id="phone" class="form-control"></div>
                    <div class="form-group"><label class="form-label">المحافظة</label><input type="text" id="governorate" class="form-control"></div>
                    <div class="form-group"><label class="form-label">المدينة</label><input type="text" id="city" class="form-control"></div>
                </div>
                <div class="form-group"><label class="form-label">نبذة شخصية</label><textarea id="bio" class="form-control" rows="4"></textarea></div>
            </div>

            <div class="section-block" id="provider-fields" style="display:none;">
                <h2 class="section-block-title">البيانات المهنية</h2>
                <div id="provider-extra"></div>
            </div>

            <!-- PDF Documents Section (non-client only) -->
            <div class="section-block" id="docs-section" style="display:none;">
                <h2 class="section-block-title">الوثائق الرسمية والمستندات (PDF)</h2>
                <p class="form-hint" style="margin-bottom:16px;">قم برفع وثائقك الرسمية كالشهادات، السجلات التجارية، أو تراخيص مزاولة المهنة. يُقبل ملف PDF فقط — بحد أقصى 5 ملفات.</p>

                <div class="doc-upload-zone" id="drop-zone">
                    <input type="file" id="doc-file-input" accept="application/pdf" multiple>
                    <div class="doc-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#0f4c5c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <p style="font-weight:700;color:var(--dark-color);margin-bottom:4px;">اسحب وأفلت ملفات PDF هنا</p>
                    <p style="font-size:.82rem;color:var(--text-muted);">أو انقر للاختيار يدوياً — PDF فقط</p>
                </div>

                <div class="doc-list" id="doc-list"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">حفظ التعديلات</button>
        </form>
    </main>
    <footer id="site-footer" class="site-footer"></footer>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    let uploadedDocs = [];

    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if (!user) { window.location.href = 'login.html'; return; }
        document.getElementById('fullName').value = user.fullName || '';
        document.getElementById('phone').value = user.phone || '';
        document.getElementById('governorate').value = user.governorate || '';
        document.getElementById('city').value = user.city || '';
        document.getElementById('bio').value = user.bio || '';

        const providerSection = document.getElementById('provider-fields');
        const providerExtra = document.getElementById('provider-extra');
        if (['engineer','office','workshop','agent','company'].includes(user.type)) {
            providerSection.style.display = 'block';
            if (user.type === 'engineer') {
                providerExtra.innerHTML = `
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <div class="form-group"><label class="form-label">التخصص</label><input type="text" id="specialty" class="form-control" value="${user.specialty||''}"></div>
                        <div class="form-group"><label class="form-label">سنوات الخبرة</label><input type="number" id="experienceYears" class="form-control" value="${user.experienceYears||''}"></div>
                    </div>
                    <div class="form-group"><label class="form-label">الشهادات والمؤهلات</label><textarea id="certificates" class="form-control" rows="3">${(user.certificates||[]).join('\n')}</textarea></div>`;
            } else if (user.type === 'agent') {
                providerExtra.innerHTML = `
                    <div class="form-group"><label class="form-label">أنواع المنتجات</label><input type="text" id="productTypes" class="form-control" value="${user.productTypes||''}"></div>
                    <div class="form-group"><label class="form-label">العلامات التجارية</label><input type="text" id="brands" class="form-control" value="${user.brands||''}"></div>`;
            }
        }

        // Show docs section for all non-client users
        if (user.type !== 'client') {
            document.getElementById('docs-section').style.display = 'block';
            uploadedDocs = user.documents || [];
            renderDocList();
        }

        // Setup upload zone
        const zone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('doc-file-input');

        zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('dragover');
            handleFiles(Array.from(e.dataTransfer.files));
        });
        fileInput.addEventListener('change', () => handleFiles(Array.from(fileInput.files)));
    });

    function handleFiles(files) {
        const pdfs = files.filter(f => f.type === 'application/pdf');
        if (!pdfs.length) { showToast('يُقبل ملف PDF فقط.', 'error'); return; }
        if (uploadedDocs.length + pdfs.length > 5) { showToast('الحد الأقصى 5 ملفات فقط.', 'error'); return; }

        pdfs.forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                uploadedDocs.push({
                    name: file.name,
                    size: Math.round(file.size / 1024) + ' KB',
                    data: ev.target.result,
                    uploadedAt: new Date().toISOString()
                });
                renderDocList();
            };
            reader.readAsDataURL(file);
        });
    }

    function renderDocList() {
        const list = document.getElementById('doc-list');
        if (!uploadedDocs.length) {
            list.innerHTML = '<p style="font-size:.85rem;color:var(--text-muted);text-align:center;padding:12px;">لا توجد وثائق مرفوعة بعد.</p>';
            return;
        }
        list.innerHTML = uploadedDocs.map((doc, i) => `
            <div class="doc-item">
                <div class="doc-item-icon">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#dc3545" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                </div>
                <div style="flex:1;">
                    <div class="doc-item-name">${doc.name}</div>
                    <div class="doc-item-size">${doc.size} — ${new Date(doc.uploadedAt).toLocaleDateString('ar-YE')}</div>
                </div>
                <a href="${doc.data}" download="${doc.name}" class="btn btn-outline btn-sm">تحميل</a>
                <button type="button" onclick="removeDoc(${i})" class="btn btn-danger btn-sm">حذف</button>
            </div>`).join('');
    }

    function removeDoc(index) {
        uploadedDocs.splice(index, 1);
        renderDocList();
    }

    document.getElementById('profile-form').addEventListener('submit', async e => {
        e.preventDefault();
        const user = getCurrentUser();
        const updates = {
            fullName: document.getElementById('fullName').value,
            phone: document.getElementById('phone').value,
            governorate: document.getElementById('governorate').value,
            city: document.getElementById('city').value,
            bio: document.getElementById('bio').value,
        };
        if (document.getElementById('specialty')) updates.specialty = document.getElementById('specialty').value;
        if (document.getElementById('experienceYears')) updates.experienceYears = document.getElementById('experienceYears').value;
        if (document.getElementById('certificates')) updates.certificates = document.getElementById('certificates').value.split('\n').filter(l => l.trim());
        if (document.getElementById('productTypes')) updates.productTypes = document.getElementById('productTypes').value;
        if (document.getElementById('brands')) updates.brands = document.getElementById('brands').value;

        if (user.type !== 'client') updates.documents = uploadedDocs;

        const updated = await updateRecord(STORAGE_KEYS.USERS, user.id, updates);
        if (updated) {
            setCurrentUser({ ...user, ...updates });
            document.getElementById('save-success').style.display = 'block';
            setTimeout(() => document.getElementById('save-success').style.display = 'none', 3000);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    });
    </script>
</body>
</html>
