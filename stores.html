<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتاجر والوكلاء | Yemen Engineer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <header id="site-header" class="site-header"></header>
    <div class="page-header">
        <div class="container">
            <h1>المتاجر والوكلاء المعتمدون</h1>
            <p>احصل على أفضل المعدات والمواد الهندسية بأسعار موثوقة من وكلاء معتمدين</p>
        </div>
    </div>
    <main class="main-layout container">
        <div class="ad-placeholder" data-ad-type="banner"></div>
        <div id="stores-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;"></div>
    </main>
    <footer id="site-footer" class="site-footer"></footer>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const stores = getData(STORAGE_KEYS.STORES);
        const users = getData(STORAGE_KEYS.USERS);
        const container = document.getElementById('stores-grid');
        if (!stores.length) { container.innerHTML = '<div class="empty-state"><div class="empty-state-title">لا توجد متاجر بعد</div></div>'; return; }
        container.innerHTML = stores.map(s => {
            const agent = users.find(u => u.id === s.agentId);
            const productCount = (s.products || []).length;
            return `
            <div class="card" style="display:flex;flex-direction:column;">
                <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px;">
                    <img src="${s.logo}" style="width:52px;height:52px;border-radius:var(--border-radius-sm);object-fit:cover;border:1.5px solid var(--border-color);">
                    <div>
                        <h3 class="card-title" style="font-size:.98rem;margin-bottom:4px;">${s.storeName}</h3>
                        <span class="badge badge-verified">وكيل معتمد</span>
                    </div>
                </div>
                <p class="card-desc">${(s.description||'').substring(0,100)}...</p>
                <div class="card-meta" style="margin:10px 0;">
                    <span>المنتجات: ${productCount}</span>
                    <span>المحافظة: ${s.governorate}</span>
                    ${agent ? `<span>التقييم: ${agent.rating || 0}</span>` : ''}
                </div>
                <div style="margin-top:auto;border-top:1px solid var(--border-color);padding-top:14px;display:flex;justify-content:space-between;align-items:center;">
                    <div style="font-size:.8rem;color:var(--text-muted);">${(s.brands || []).slice(0,3).join(' - ')}</div>
                    <a href="store-details.html?id=${s.id}" class="btn btn-primary btn-sm">زيارة المعرض</a>
                </div>
            </div>`;
        }).join('');
    });
    </script>
</body>
</html>
