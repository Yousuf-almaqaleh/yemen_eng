<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف المهندس | Yemen Engineer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .engineer-hero { background: var(--primary-gradient); padding: 50px 0; color: #fff; }
        .engineer-avatar { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: var(--shadow-md); }
    </style>
</head>
<body>
    <header id="site-header" class="site-header"></header>
    <main>
        <div class="engineer-hero">
            <div class="container">
                <div id="eng-header"></div>
            </div>
        </div>
        <div class="main-layout container">
            <div class="two-col-layout">
                <div>
                    <div class="section-block" id="eng-bio"></div>
                    <div class="section-block" id="eng-certs"></div>
                </div>
                <div>
                    <div class="section-block" id="eng-sidebar"></div>
                    <div class="section-block" id="eng-action"></div>
                </div>
            </div>
        </div>
    </main>
    <footer id="site-footer" class="site-footer"></footer>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) { window.location.href = 'engineers.html'; return; }
        const users = getData(STORAGE_KEYS.USERS);
        const eng = users.find(u => u.id === id);
        if (!eng) { window.location.href = 'engineers.html'; return; }
        document.title = `${eng.fullName} | Yemen Engineer`;

        document.getElementById('eng-header').innerHTML = `
            <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;">
                <img src="${eng.avatar}" class="engineer-avatar">
                <div>
                    <h1 style="font-size:1.8rem;font-weight:800;margin-bottom:6px;">${eng.fullName}</h1>
                    <p style="color:rgba(255,255,255,.8);margin-bottom:10px;">${eng.specialty || ''} ${eng.experienceYears ? '| خبرة ' + eng.experienceYears + ' سنة' : ''}</p>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <span class="badge badge-verified">${eng.isVerified ? 'موثق' : 'قيد المراجعة'}</span>
                        <span style="color:rgba(255,255,255,.8);">${eng.governorate} - ${eng.city || ''}</span>
                    </div>
                </div>
            </div>`;

        document.getElementById('eng-bio').innerHTML = `
            <h2 class="section-block-title">نبذة تعريفية</h2>
            <p style="font-size:.92rem;line-height:1.7;color:var(--dark-color);">${eng.bio || 'لم يتم إضافة نبذة بعد.'}</p>`;

        if (eng.certificates && eng.certificates.length) {
            document.getElementById('eng-certs').innerHTML = `
                <h2 class="section-block-title">الشهادات والمؤهلات</h2>
                <ul style="list-style:none;padding:0;display:flex;flex-direction:column;gap:10px;">
                    ${eng.certificates.map(c => `<li style="display:flex;gap:8px;align-items:flex-start;font-size:.9rem;"><span style="color:var(--success-color);font-weight:700;">&#10003;</span>${c}</li>`).join('')}
                </ul>`;
        }

        document.getElementById('eng-sidebar').innerHTML = `
            <h2 class="section-block-title">معلومات سريعة</h2>
            <div style="display:flex;flex-direction:column;gap:14px;">
                <div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border-color);padding-bottom:10px;">
                    <span style="font-size:.85rem;color:var(--text-muted);">التقييم</span>
                    <span style="font-weight:700;color:#f59e0b;">${eng.rating || 5} (${eng.ratingCount || 0} تقييم)</span>
                </div>
                <div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border-color);padding-bottom:10px;">
                    <span style="font-size:.85rem;color:var(--text-muted);">التخصص</span>
                    <span style="font-weight:700;">${eng.specialty || 'متعدد'}</span>
                </div>
                <div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border-color);padding-bottom:10px;">
                    <span style="font-size:.85rem;color:var(--text-muted);">الخبرة</span>
                    <span style="font-weight:700;">${eng.experienceYears || 0} سنة</span>
                </div>
                <div style="display:flex;justify-content:space-between;">
                    <span style="font-size:.85rem;color:var(--text-muted);">الموقع</span>
                    <span style="font-weight:700;">${eng.governorate}</span>
                </div>
            </div>`;

        const currentUser = getCurrentUser();
        const canContact = currentUser && currentUser.id !== eng.id;
        document.getElementById('eng-action').innerHTML = `
            <h2 class="section-block-title">تواصل</h2>
            ${canContact ? `<p style="font-size:.85rem;color:var(--text-muted);margin-bottom:14px;">انشر طلب خدمة وسيقوم المهندس بمراجعته وتقديم عرض.</p>
                <a href="post-request.html?providerId=${eng.id}" class="btn btn-primary" style="width:100%;">طلب خدمة</a>` : 
                `<p style="font-size:.85rem;color:var(--text-muted);">سجل دخول للتواصل مع المهندس.</p>
                <a href="login.html" class="btn btn-primary" style="width:100%;">تسجيل الدخول</a>`}`;
    });
    </script>
</body>
</html>
