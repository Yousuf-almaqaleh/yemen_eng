<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاشعارات | Yemen Engineer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        .notif-card { background:#fff; border:1.5px solid var(--border-color); border-radius:var(--border-radius); padding:18px 22px; margin-bottom:12px; display:flex; align-items:center; gap:16px; transition:var(--transition); cursor:pointer; }
        .notif-card:hover { transform:translateX(-3px); border-color:var(--primary-color); }
        .notif-card.unread { border-right:4px solid var(--primary-color); background:rgba(15,76,92,.02); }
        .notif-icon-wrap { width:44px; height:44px; border-radius:50%; background:#f1f3f5; display:flex; align-items:center; justify-content:center; font-size:.82rem; font-weight:800; color:var(--primary-color); flex-shrink:0; }
    </style>
</head>
<body>
    <header id="site-header" class="site-header"></header>
    <main class="main-layout container" style="max-width:780px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <h1 style="font-size:1.4rem;font-weight:800;">الاشعارات (<span id="notif-count">0</span>)</h1>
            <button onclick="markAllRead()" class="btn btn-outline btn-sm">تحديد الكل كمقروء</button>
        </div>
        <div id="notifs-list"></div>
    </main>
    <footer id="site-footer" class="site-footer"></footer>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if (!user) { window.location.href = 'login.html'; return; }
        renderNotifications(user);
    });

    function renderNotifications(user) {
        const notifs = getData(STORAGE_KEYS.NOTIFICATIONS)
            .filter(n => n.userId === user.id)
            .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
        document.getElementById('notif-count').textContent = notifs.length;
        const container = document.getElementById('notifs-list');
        if (!notifs.length) {
            container.innerHTML = '<div class="empty-state"><div class="empty-state-title">لا توجد اشعارات</div><p>ستظهر هنا تنبيهات المنصة المتعلقة بطلباتك.</p></div>';
            return;
        }
        container.innerHTML = notifs.map(n => `
            <div class="notif-card ${!n.read ? 'unread' : ''}" onclick="openNotif('${n.id}','${n.link}')">
                <div class="notif-icon-wrap">${n.read ? 'Q' : 'N'}</div>
                <div style="flex:1;">
                    <div style="font-weight:${n.read ? '600':'800'};font-size:.92rem;margin-bottom:3px;">${n.title}</div>
                    <div style="font-size:.82rem;color:var(--text-muted);">${n.message}</div>
                </div>
                <button onclick="event.stopPropagation();deleteNotif('${n.id}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.95rem;padding:6px;">x</button>
            </div>`).join('');
    }

    function openNotif(id, link) {
        const notifs = getData(STORAGE_KEYS.NOTIFICATIONS);
        const idx = notifs.findIndex(n => n.id === id);
        if (idx !== -1) { notifs[idx].read = true; saveData(STORAGE_KEYS.NOTIFICATIONS, notifs); }
        window.location.href = link;
    }

    function deleteNotif(id) {
        deleteRecord(STORAGE_KEYS.NOTIFICATIONS, id);
        renderNotifications(getCurrentUser());
    }

    function markAllRead() {
        const user = getCurrentUser();
        const notifs = getData(STORAGE_KEYS.NOTIFICATIONS);
        notifs.forEach(n => { if (n.userId === user.id) n.read = true; });
        saveData(STORAGE_KEYS.NOTIFICATIONS, notifs);
        renderNotifications(user);
        showToast('تم تحديد جميع الاشعارات كمقروء.', 'success');
    }
    </script>
</body>
</html>
