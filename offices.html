<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل المكاتب والشركات | Yemen Engineer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <header id="site-header" class="site-header"></header>
    <div class="page-header">
        <div class="container">
            <h1>دليل الشركات والمكاتب والورش الهندسية</h1>
            <p>ابحث عن الشركاء الهندسية والورش الفنية لتنفيذ مشاريعك باحترافية</p>
        </div>
    </div>
    <main class="main-layout container">
        <div class="filter-bar">
            <div class="filter-field">
                <label>بحث بالاسم</label>
                <input type="text" id="f-name" placeholder="اسم الشركة أو المكتب..." oninput="applyFilters()">
            </div>
            <div class="filter-field">
                <label>النوع</label>
                <select id="f-type" onchange="applyFilters()">
                    <option value="">كل الأنواع</option>
                    <option value="office">مكتب هندسي</option>
                    <option value="workshop">ورشة فنية</option>
                    <option value="company">شركة هندسية / مقاولات</option>
                </select>
            </div>
            <div class="filter-field">
                <label>المحافظة</label>
                <select id="f-gov" onchange="applyFilters()">
                    <option value="">كل المحافظات</option>
                    <option>صنعاء</option><option>عدن</option><option>تعز</option><option>حضرموت</option><option>الحديدة</option>
                </select>
            </div>
        </div>
        <div id="providers-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;"></div>
    </main>
    <footer id="site-footer" class="site-footer"></footer>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
    let allProviders = [];
    document.addEventListener('DOMContentLoaded', async () => {
        const users = await getData(STORAGE_KEYS.USERS);
        allProviders = users.filter(u => ['office', 'workshop', 'company'].includes(u.type));
        applyFilters();
    });

    function applyFilters() {
        const name = document.getElementById('f-name').value.toLowerCase();
        const type = document.getElementById('f-type').value;
        const gov = document.getElementById('f-gov').value;
        let results = allProviders;

        if (name) {
            results = results.filter(p => {
                const pName = (p.officeName || p.workshopName || p.companyName || p.fullName || '').toLowerCase();
                return pName.includes(name);
            });
        }
        if (type) results = results.filter(p => p.type === type);
        if (gov) results = results.filter(p => p.governorate === gov);

        renderProviders(results);
    }

    function renderProviders(list) {
        const container = document.getElementById('providers-list');
        if (!list.length) {
            container.innerHTML = '<div class="empty-state"><div class="empty-state-title">لا توجد نتائج</div></div>';
            return;
        }

        const roleLabels = { office: 'مكتب هندسي', workshop: 'ورشة فنية', company: 'شركة هندسية' };
        container.innerHTML = list.map(p => {
            const pName = p.officeName || p.workshopName || p.companyName || p.fullName;
            return `
            <div class="card" style="display:flex;flex-direction:column;">
                <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px;">
                    <img src="${p.avatar || 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=100'}" style="width:58px;height:58px;border-radius:var(--border-radius-sm);object-fit:cover;border:1.5px solid var(--border-color);">
                    <div>
                        <h3 class="card-title" style="margin-bottom:4px;font-size:1.02rem;">${pName}</h3>
                        <span class="badge badge-verified">${roleLabels[p.type] || p.type}</span>
                    </div>
                </div>
                <div class="card-meta">
                    <span>${p.governorate}</span>
                    <span>${p.specialty || p.activityType || 'خدمات عامة'}</span>
                </div>
                <p class="card-desc" style="flex:1;">${(p.bio || '').substring(0, 100)}...</p>
                <div style="margin-top:auto;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border-color);padding-top:14px;">
                    <span style="color:#f59e0b;font-weight:700;">${p.rating || 5} (${p.ratingCount || 0} تقييم)</span>
                    <a href="office-details.html?id=${p.id}" class="btn btn-outline btn-sm">ملف الشركة</a>
                </div>
            </div>`;
        }).join('');
    }
    </script>
</body>
</html>
